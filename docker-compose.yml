version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: bd-postgres
    environment:
      POSTGRES_DB: inventario_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - red-inventario

  liquibase:
    build: .
    container_name: bd-liquibase
    depends_on:
      - postgres
    command: >
      --url=jdbc:postgresql://postgres:5432/inventario_db
      --username=admin
      --password=admin123
      --changeLogFile=changelog-master.xml
      update
    networks:
      - red-inventario

volumes:
  postgres_data:

networks:
  red-inventario:
    driver: bridge
